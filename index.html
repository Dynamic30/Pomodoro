<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro</title>
  <link rel="icon" href="/favicon.png" type="image/png" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"></script>
  <style>*{box-sizing:border-box;margin:0;padding:0}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const API = "";
    const MODE_MAP = { work: "Work", short: "Short Break", long: "Long Break" };

    const api = {
      get: (path) => fetch(`${API}${path}`).then((r) => r.json()).catch(console.error),
      post: (path, body) =>
        fetch(`${API}${path}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }).then((r) => r.json()).catch(console.error),
      put: (path, body) =>
        fetch(`${API}${path}`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: body ? JSON.stringify(body) : undefined }).then((r) => r.json()).catch(console.error),
    };

    function App() {
      const [theme, setTheme] = useState("light");
      const [showMenu, setShowMenu] = useState(false);
      const [menuTab, setMenuTab] = useState("report");
      const [tasks, setTasks] = useState([]);
      const [taskInput, setTaskInput] = useState("");
      const [breakInput, setBreakInput] = useState("");
      const [timerMinutes, setTimerMinutes] = useState(25);
      const [mode, setMode] = useState("work");
      const [activeBreak, setActiveBreak] = useState(null);
      const [showResumePicker, setShowResumePicker] = useState(false);
      const [pausedByBreak, setPausedByBreak] = useState([]);
      const [showCompleteDialog, setShowCompleteDialog] = useState(false);
      const [completingTaskId, setCompletingTaskId] = useState(null);
      const [sessions, setSessions] = useState([]);
      const [toasts, setToasts] = useState([]);
      const [currentUser, setCurrentUser] = useState(null);
      const [users, setUsers] = useState([]);
      const [usersLoaded, setUsersLoaded] = useState(false);
      const [showAddUser, setShowAddUser] = useState(false);
      const [newUserName, setNewUserName] = useState("");
      const [newUserPassword, setNewUserPassword] = useState("");
      const [loginTarget, setLoginTarget] = useState(null);
      const [passwordInput, setPasswordInput] = useState("");
      const [loginError, setLoginError] = useState("");
      const [showPassword, setShowPassword] = useState(false);
      const [showUserSwitcher, setShowUserSwitcher] = useState(false);
      const audioCtxRef = useRef(null);
      const topRef = useRef(null);
      const bottomRef = useRef(null);
      const loadedRef = useRef(false);

      const BREAK_PRESETS = { short: 5, long: 15 };
      const u = currentUser ? `/${currentUser.id}` : "";

      const playBeep = useCallback(() => {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          let count = 0;
          const maxBeeps = currentUser?.sound_duration || 10;

          const beepOnce = () => {
            if (count >= maxBeeps) return;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 880;
            osc.type = "sine";
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.4);
            count++;
            setTimeout(beepOnce, 1000);
          };

          beepOnce();
        } catch (e) {}
      }, [currentUser]);

      const showToast = useCallback((name) => {
        const id = Date.now();
        setToasts((p) => [...p, { id, name }]);
        setTimeout(() => setToasts((p) => p.filter((t) => t.id !== id)), 2500);
      }, []);

      useEffect(() => {
        if (!currentUser) return;
        const iv = setInterval(() => {
          setTasks((prev) => {
            const next = prev.map((t) => {
              if (!t.isRunning || t.remaining <= 0) return t;
              const n = t.remaining - 1;
              if (n <= 0) {
                playBeep();
                setSessions((s) => [...s, { type: "Pomodoro", task: t.name, duration: t.total, completedAt: new Date().toLocaleTimeString() }]);
                api.put(`${u}/task_complete/${t.backendId}`);
                showToast(t.name);
                return null;
              }
              if (n % 5 === 0) api.put(`${u}/heartbeat/${t.backendId}`, { timer: n });
              return { ...t, remaining: n };
            });
            return next.filter(Boolean);
          });
          setActiveBreak((prev) => {
            if (!prev || !prev.isRunning || prev.remaining <= 0) return prev;
            const next = prev.remaining - 1;
            if (next <= 0) {
              playBeep();
              setSessions((s) => [...s, { type: prev.mode === "short" ? "Short Break" : "Long Break", task: prev.name, duration: prev.total, completedAt: new Date().toLocaleTimeString() }]);
              api.put(`${u}/task_complete/${prev.backendId}`);
              return { ...prev, remaining: 0, isRunning: false };
            }
            if (next % 5 === 0) api.put(`${u}/heartbeat/${prev.backendId}`, { timer: next });
            return { ...prev, remaining: next };
          });
        }, 1000);
        return () => clearInterval(iv);
      }, [playBeep, currentUser]);

      useEffect(() => {
        if (activeBreak && activeBreak.remaining === 0 && !activeBreak.isRunning) {
          if (pausedByBreak.length > 0) setShowResumePicker(true);
          setActiveBreak(null);
        }
      }, [activeBreak, pausedByBreak]);

      // Reset password visibility whenever we switch between login / add-user views.
      useEffect(() => { setShowPassword(false); }, [loginTarget, showAddUser]);

      // Fetch the user list on mount; auto-login or prompt for password from saved session.
      useEffect(() => {
        api.get("/users").then((list) => {
          if (!Array.isArray(list)) { setUsersLoaded(true); return; }
          setUsers(list);
          setUsersLoaded(true);
          try {
            const raw = localStorage.getItem("pomo-user");
            if (raw) {
              const saved = JSON.parse(raw);
              const match = list.find((x) => x.id === saved.id && x.name === saved.name);
              if (match) {
                if (match.has_password) {
                  setLoginTarget(match);
                } else {
                  setCurrentUser(match);
                  if (match.theme) setTheme(match.theme);
                }
              }
            }
          } catch (e) {}
        });
      }, []);

      // Restore UI prefs + report from localStorage, and active timers from the backend.
      useEffect(() => {
        if (!currentUser) return;
        try {
          const raw = localStorage.getItem(`pomo-prefs-${currentUser.id}`);
          if (raw) {
            const s = JSON.parse(raw);
            if (s.mode) setMode(s.mode);
            if (typeof s.timerMinutes === "number") setTimerMinutes(s.timerMinutes);
            if (Array.isArray(s.sessions)) setSessions(s.sessions);
          }
        } catch (e) {}

        // SQLite's updated_at is "YYYY-MM-DD HH:MM:SS" in UTC — parse it as UTC.
        const elapsedSince = (updatedAt) => {
          const t = Date.parse((updatedAt || "").replace(" ", "T") + "Z");
          return isNaN(t) ? 0 : Math.max(0, Math.floor((Date.now() - t) / 1000));
        };

        api.get(`${u}/fetch_active_timer`).then((rows) => {
          if (Array.isArray(rows)) {
            const restoredTasks = [];
            let restoredBreak = null;
            for (const r of rows) {
              const running = r.status === "Running" || r.status === "Restarted";
              const remaining = Math.max(0, r.timer - (running ? elapsedSince(r.updated_at) : 0));
              if (r.mode === "Work") {
                restoredTasks.push({
                  id: r.id, backendId: r.id, name: r.task, total: r.duration, remaining,
                  isRunning: running && remaining > 0, isPausedByBreak: false,
                  status: running && remaining > 0 ? "Running" : remaining <= 0 ? "Completed" : "Paused",
                });
              } else if (running && remaining > 0 && !restoredBreak) {
                restoredBreak = {
                  id: r.id, backendId: r.id, name: r.task,
                  mode: r.mode === "Short Break" ? "short" : "long",
                  total: r.duration, remaining, isRunning: true,
                };
              }
            }
            setTasks(restoredTasks);
            if (restoredBreak) setActiveBreak(restoredBreak);
          }
        }).finally(() => { loadedRef.current = true; });
      }, [currentUser]);

      // Persist UI prefs + report (timers live in the backend, theme lives on the user).
      useEffect(() => {
        if (!loadedRef.current || !currentUser) return;
        try {
          localStorage.setItem(`pomo-prefs-${currentUser.id}`, JSON.stringify({ mode, timerMinutes, sessions }));
        } catch (e) {}
      }, [mode, timerMinutes, sessions, currentUser]);

      const fmt = (s) => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
      const handleWheel = (e) => { e.preventDefault(); setTimerMinutes((p) => Math.max(1, Math.min(90, p + (e.deltaY < 0 ? 1 : -1)))); };

      const handleStartPomodoro = async () => {
        if (!taskInput.trim() || activeBreak || !currentUser) return;
        const secs = timerMinutes * 60;
        const res = await api.post(`${u}/set_timer`, { method: MODE_MAP[mode] || "Work", timer: secs, task: taskInput.trim() });
        if (res?.id) {
          setTasks((p) => [...p, { id: Date.now(), backendId: res.id, name: taskInput.trim(), total: secs, remaining: secs, isRunning: true, isPausedByBreak: false, status: "Running" }]);
          setTaskInput("");
        }
      };

      const handleStartBreak = async () => {
        if (!breakInput.trim() || activeBreak || !currentUser) return;
        const mins = BREAK_PRESETS[mode] || 5;
        const secs = mins * 60;
        const res = await api.post(`${u}/set_timer`, { method: MODE_MAP[mode], timer: secs, task: breakInput.trim() });
        const runningTasks = tasks.filter((t) => t.isRunning);
        for (const t of runningTasks) { api.put(`${u}/update_timer/${t.backendId}`, { status: "Paused", timer: t.remaining }); }
        const ids = runningTasks.map((t) => t.id);
        setTasks((p) => p.map((t) => t.isRunning ? { ...t, isRunning: false, isPausedByBreak: true } : t));
        setPausedByBreak(ids);
        setActiveBreak({ id: Date.now(), backendId: res?.id, name: breakInput.trim(), mode, total: secs, remaining: secs, isRunning: true });
        setBreakInput("");
      };

      const handleResumeTask = (id) => {
        const t = tasks.find((x) => x.id === id);
        if (t) api.put(`${u}/update_timer/${t.backendId}`, { status: "Running", timer: t.remaining });
        setTasks((p) => p.map((x) => x.id === id ? { ...x, isRunning: true, isPausedByBreak: false } : x));
        setPausedByBreak([]); setShowResumePicker(false);
      };

      const handleResumeAll = () => {
        tasks.filter((t) => t.isPausedByBreak).forEach((t) => { api.put(`${u}/update_timer/${t.backendId}`, { status: "Running", timer: t.remaining }); });
        setTasks((p) => p.map((t) => t.isPausedByBreak ? { ...t, isRunning: true, isPausedByBreak: false } : t));
        setPausedByBreak([]); setShowResumePicker(false);
      };

      const handleCancelBreak = () => {
        if (!activeBreak) return;
        api.put(`${u}/task_complete/${activeBreak.backendId}`);
        tasks.filter((t) => t.isPausedByBreak).forEach((t) => {
          api.put(`${u}/update_timer/${t.backendId}`, { status: "Running", timer: t.remaining });
        });
        setTasks((p) => p.map((t) => t.isPausedByBreak ? { ...t, isRunning: true, isPausedByBreak: false } : t));
        setActiveBreak(null);
        setPausedByBreak([]);
      };

      const handleTogglePause = (id) => {
        const t = tasks.find((x) => x.id === id);
        if (t && t.remaining > 0) {
          api.put(`${u}/update_timer/${t.backendId}`, { status: t.isRunning ? "Paused" : "Running", timer: t.remaining });
          setTasks((p) => p.map((x) => x.id === id ? { ...x, isRunning: !x.isRunning } : x));
        }
      };

      const handleAskComplete = (id) => { setCompletingTaskId(id); setShowCompleteDialog(true); };

      const handleConfirmComplete = () => {
        const t = tasks.find((x) => x.id === completingTaskId);
        if (t) { api.put(`${u}/task_complete/${t.backendId}`); setSessions((s) => [...s, { type: "Pomodoro", task: t.name, duration: t.total, completedAt: new Date().toLocaleTimeString() }]); showToast(t.name); }
        setTasks((p) => p.filter((x) => x.id !== completingTaskId));
        setShowCompleteDialog(false); setCompletingTaskId(null);
      };

      const handleDismiss = (id) => setTasks((p) => p.filter((t) => t.id !== id));
      const scrollToAdd = () => bottomRef.current?.scrollIntoView({ behavior: "smooth" });
      const scrollToTop = () => topRef.current?.scrollIntoView({ behavior: "smooth" });

      // --- User auth handlers ---
      const loginUser = (user) => {
        if (currentUser && currentUser.id !== user.id) handleLogout();
        setCurrentUser(user);
        if (user.theme) setTheme(user.theme);
        try { localStorage.setItem("pomo-user", JSON.stringify({ id: user.id, name: user.name })); } catch (e) {}
        setLoginTarget(null); setPasswordInput(""); setLoginError("");
        setShowAddUser(false); setNewUserName(""); setNewUserPassword("");
        setShowUserSwitcher(false);
      };

      const handleSelectUser = (user) => {
        // Picking the user you're already signed in as just dismisses the switcher.
        if (currentUser && currentUser.id === user.id) { setShowUserSwitcher(false); return; }
        if (user.has_password) { setLoginTarget(user); setLoginError(""); setPasswordInput(""); }
        else loginUser(user);
      };

      const handleLogin = async () => {
        if (!loginTarget) return;
        const res = await api.post(`/users/${loginTarget.id}/login`, { password: passwordInput });
        if (res?.success) loginUser(loginTarget);
        else setLoginError(res?.error || "Login failed");
      };

      const handleCreateUser = async () => {
        if (!newUserName.trim()) return;
        const res = await api.post("/users", { name: newUserName.trim(), password: newUserPassword || null });
        if (res?.id) {
          const newUser = { id: res.id, name: res.name, has_password: !!res.has_password, theme: "light", sound_duration: 10 };
          setUsers((p) => [...p, newUser]);
          loginUser(newUser);
        }
      };

      const handleLogout = () => {
        setCurrentUser(null);
        setTasks([]); setSessions([]); setActiveBreak(null); setPausedByBreak([]);
        setShowMenu(false); setShowResumePicker(false); setShowUserSwitcher(false);
        loadedRef.current = false;
        try { localStorage.removeItem("pomo-user"); } catch (e) {}
      };

      const handleThemeChange = (newTheme) => {
        setTheme(newTheme);
        if (currentUser) {
          api.put(`/users/${currentUser.id}/settings`, { theme: newTheme });
          setUsers((p) => p.map((x) => x.id === currentUser.id ? { ...x, theme: newTheme } : x));
          setCurrentUser((x) => x ? { ...x, theme: newTheme } : x);
        }
      };

      // Update sound duration locally on drag; persist to the backend only when the drag ends.
      const handleSoundDurationInput = (value) => {
        setCurrentUser((x) => x ? { ...x, sound_duration: value } : x);
        setUsers((p) => p.map((x) => currentUser && x.id === currentUser.id ? { ...x, sound_duration: value } : x));
      };

      const handleSoundDurationCommit = (value) => {
        if (currentUser) api.put(`/users/${currentUser.id}/settings`, { sound_duration: value });
      };

      const THEMES = {
        light: { bg: "#faf8f5", bgDim: "#f0ece6", surface: "#ffffff", text: "#2d2d2d", textMuted: "#999", accent: "#d35d45", accentSoft: "rgba(211,93,69,0.08)", ring: "#d35d45", ringTrack: "rgba(211,93,69,0.1)", border: "rgba(0,0,0,0.06)", shadow: "rgba(0,0,0,0.06)", overlay: "rgba(0,0,0,0.35)", green: "#16a34a", greenSoft: "rgba(22,163,74,0.08)", pillBg: "#ffffff" },
        dark: { bg: "#1a1a2e", bgDim: "#141425", surface: "#16213e", text: "#e0e0e0", textMuted: "#8a8a9a", accent: "#e07a5f", accentSoft: "rgba(224,122,95,0.15)", ring: "#e07a5f", ringTrack: "rgba(224,122,95,0.12)", border: "rgba(255,255,255,0.06)", shadow: "rgba(0,0,0,0.3)", overlay: "rgba(0,0,0,0.6)", green: "#4ade80", greenSoft: "rgba(74,222,128,0.12)", pillBg: "#1e2a4a" },
        sepia: { bg: "#f5efe6", bgDim: "#e9e2d6", surface: "#fbf7f0", text: "#5b4636", textMuted: "#a3927a", accent: "#bb6b3d", accentSoft: "rgba(187,107,61,0.1)", ring: "#bb6b3d", ringTrack: "rgba(187,107,61,0.14)", border: "rgba(91,70,54,0.12)", shadow: "rgba(91,70,54,0.1)", overlay: "rgba(60,45,30,0.4)", green: "#6b8e3d", greenSoft: "rgba(107,142,61,0.12)", pillBg: "#fbf7f0" },
      };
      const c = THEMES[theme] || THEMES.light;

      const activeTasks = tasks.filter((t) => t.remaining > 0);
      const completedTasks = tasks.filter((t) => t.remaining === 0);
      const hasRunning = activeTasks.some((t) => t.isRunning) || activeBreak?.isRunning;
      const completingTask = tasks.find((t) => t.id === completingTaskId);
      const isBreakMode = mode === "short" || mode === "long";
      const inFocus = activeTasks.length > 0;

      const workSessions = sessions.filter((s) => s.type === "Pomodoro");
      const breakSessions = sessions.filter((s) => s.type !== "Pomodoro");
      const avgWork = workSessions.length ? Math.round(workSessions.reduce((a,b) => a+b.duration, 0) / workSessions.length / 60) : 0;
      const avgBreak = breakSessions.length ? Math.round(breakSessions.reduce((a,b) => a+b.duration, 0) / breakSessions.length / 60) : 0;

      // Lock page scroll when there are no active timers (single circular page); allow it once tasks exist.
      useEffect(() => {
        document.body.style.overflow = "hidden";
        return () => { document.body.style.overflow = ""; };
      }, [inFocus]);

      return (
        <div style={{ height: "100vh", background: inFocus ? c.bgDim : c.bg, color: c.text, fontFamily: "'DM Sans','Helvetica Neue',sans-serif", transition: "background 0.6s ease, color 0.4s", display: "flex", flexDirection: "column" }}>
          <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

          {/* Top Bar */}
          <header style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 28px", borderBottom: `1px solid ${c.border}`, flexShrink: 0, opacity: inFocus ? 0.6 : 1, transition: "opacity 0.4s" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ width: 7, height: 7, borderRadius: "50%", background: c.accent, animation: hasRunning ? "pulse 2s infinite" : "none" }} />
              <span style={{ fontSize: 14, fontWeight: 500, letterSpacing: "0.08em", textTransform: "uppercase" }}>Pomo</span>
              {currentUser && <button onClick={() => setShowUserSwitcher(true)} title="Switch user" style={{ fontSize: 11, color: c.accent, background: c.accentSoft, border: "none", padding: "3px 10px", borderRadius: 6, fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>{currentUser.name}</button>}
              {activeTasks.length > 0 && <span style={{ fontSize: 10, color: c.accent, background: c.accentSoft, padding: "2px 8px", borderRadius: 6, fontWeight: 500 }}>{activeTasks.filter((t)=>t.isRunning).length} active</span>}
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={() => setShowMenu((v) => !v)} style={{ background: showMenu ? c.accentSoft : "transparent", border: `1px solid ${c.border}`, color: c.text, padding: "6px 14px", borderRadius: 8, cursor: "pointer", fontSize: 12, fontFamily: "inherit", transition: "all 0.2s" }}>Menu</button>
            </div>
          </header>

          {/* Break Banner */}
          {activeBreak && (
            <div style={{ background: c.accentSoft, padding: "12px 28px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: `1px solid ${c.border}`, animation: "slideDown 0.2s ease", flexShrink: 0 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 12, color: c.accent, fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.06em" }}>{activeBreak.mode === "short" ? "Short" : "Long"} Break</span>
                <span style={{ fontSize: 12, color: c.textMuted }}>·</span>
                <span style={{ fontSize: 13, color: c.text }}>{activeBreak.name}</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                <span style={{ fontFamily: "'DM Mono',monospace", fontSize: 20, fontWeight: 300, color: c.accent }}>{fmt(activeBreak.remaining)}</span>
                <button onClick={handleCancelBreak} style={{ background: "transparent", border: `1px solid ${c.accent}`, color: c.accent, padding: "4px 12px", borderRadius: 6, cursor: "pointer", fontSize: 11, fontFamily: "inherit", letterSpacing: "0.04em", opacity: 0.8, transition: "opacity 0.15s" }} onMouseEnter={(e) => e.currentTarget.style.opacity="1"} onMouseLeave={(e) => e.currentTarget.style.opacity="0.8"}>Cancel</button>
              </div>
            </div>
          )}

          {/* Scrollable Body */}
          <div style={{ flex: 1, height: 0, minHeight: 0, overflowY: inFocus ? "auto" : "hidden", scrollSnapType: inFocus ? "y proximity" : "none", scrollBehavior: "smooth", WebkitOverflowScrolling: "touch", overscrollBehavior: "contain" }}>

            {/* FOCUS ZONE */}
            {activeTasks.length > 0 && (
              <div ref={topRef} style={{ minHeight: "calc(100vh - 60px)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "40px 24px", gap: 12, scrollSnapAlign: "start" }}>
                {activeTasks.map((t, idx) => {
                  const progress = t.total > 0 ? ((t.total - t.remaining) / t.total) * 100 : 0;
                  return (
                    <div key={t.id} style={{ display: "flex", alignItems: "center", background: c.pillBg, borderRadius: 16, padding: "20px 24px", boxShadow: `0 2px 12px ${c.shadow}`, gap: 20, width: "100%", maxWidth: 520, animation: "slideDown 0.3s ease", position: "relative", overflow: "hidden", border: t.isRunning ? `1px solid ${c.accentSoft}` : `1px solid ${c.border}`, transition: "border 0.3s, box-shadow 0.3s" }}>
                      <div style={{ position: "absolute", bottom: 0, left: 0, width: `${progress}%`, height: 2, background: t.isRunning ? c.accent : c.textMuted, transition: "width 1s linear", opacity: 0.5 }} />
                      <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 36, fontWeight: 300, color: t.isRunning ? c.accent : c.textMuted, minWidth: 120, transition: "color 0.3s", letterSpacing: "0.02em" }}>{fmt(t.remaining)}</div>
                      <div style={{ width: 1, height: 40, background: c.border, flexShrink: 0 }} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 15, fontWeight: 400, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginBottom: 3 }}>{t.name}</div>
                        <div style={{ fontSize: 11, color: t.isPausedByBreak ? c.accent : c.textMuted, letterSpacing: "0.03em" }}>{t.isPausedByBreak ? "⏸ On break" : t.isRunning ? "Running" : "Paused"}</div>
                      </div>

                    <div style={{ position: "relative", marginBottom: loginError ? 8 : 20 }}>
                      <input type={showPassword ? "text" : "password"} value={passwordInput} autoFocus onChange={(e) => setPasswordInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && handleLogin()} placeholder="Password" style={{ background: c.bg, border: `1px solid ${c.border}`, borderRadius: 10, color: c.text, fontSize: 14, fontFamily: "inherit", padding: "12px 40px 12px 14px", width: "100%", outline: "none", transition: "all 0.2s" }} onFocus={(e) => e.target.style.borderColor=c.accent} onBlur={(e) => e.target.style.borderColor=c.border} />
                      <button onClick={() => setShowPassword((p) => !p)} style={{ position: "absolute", right: 0, top: "50%", transform: "translateY(-50%)", background: "transparent", border: "none", cursor: "pointer", padding: "4px 8px", color: c.textMuted, fontSize: 14 }}>{showPassword ? "🙈" : "👁"}</button>
                    </div>
                    {loginError && <div style={{ fontSize: 12, color: c.accent, marginBottom: 16 }}>{loginError}</div>}
                    <div style={{ display: "flex", gap: 10 }}>
                      <button onClick={() => { setLoginTarget(null); setPasswordInput(""); setLoginError(""); }} style={{ flex: 1, padding: "11px 0", borderRadius: 10, border: `1px solid ${c.border}`, background: "transparent", color: c.textMuted, fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>Back</button>
                      <button onClick={handleLogin} style={{ flex: 1, padding: "11px 0", borderRadius: 10, border: "none", background: c.accent, color: "#fff", fontSize: 13, fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>Login</button>
                    </div>
                  </React.Fragment>
                ) : showAddUser ? (
                  /* View 3 — Add user form */
                  <React.Fragment>
                    <input type="text" value={newUserName} autoFocus onChange={(e) => setNewUserName(e.target.value)} placeholder="Name" style={{ background: c.bg, border: `1px solid ${c.border}`, borderRadius: 10, color: c.text, fontSize: 14, fontFamily: "inherit", padding: "12px 14px", width: "100%", outline: "none", marginBottom: 12, transition: "all 0.2s" }} onFocus={(e) => e.target.style.borderColor=c.accent} onBlur={(e) => e.target.style.borderColor=c.border} />
                    <div style={{ position: "relative", marginBottom: 6 }}>
                      <input type={showPassword ? "text" : "password"} value={newUserPassword} onChange={(e) => setNewUserPassword(e.target.value)} onKeyDown={(e) => e.key === "Enter" && handleCreateUser()} placeholder="Password" style={{ background: c.bg, border: `1px solid ${c.border}`, borderRadius: 10, color: c.text, fontSize: 14, fontFamily: "inherit", padding: "12px 40px 12px 14px", width: "100%", outline: "none", transition: "all 0.2s" }} onFocus={(e) => e.target.style.borderColor=c.accent} onBlur={(e) => e.target.style.borderColor=c.border} />
                      <button onClick={() => setShowPassword((p) => !p)} style={{ position: "absolute", right: 0, top: "50%", transform: "translateY(-50%)", background: "transparent", border: "none", cursor: "pointer", padding: "4px 8px", color: c.textMuted, fontSize: 14 }}>{showPassword ? "🙈" : "👁"}</button>
                    </div>
                    <div style={{ fontSize: 11, color: c.textMuted, marginBottom: 20 }}>Leave blank for no password</div>
                    <div style={{ display: "flex", gap: 10 }}>
                      <button onClick={() => { setShowAddUser(false); setNewUserName(""); setNewUserPassword(""); }} style={{ flex: 1, padding: "11px 0", borderRadius: 10, border: `1px solid ${c.border}`, background: "transparent", color: c.textMuted, fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                      <button onClick={handleCreateUser} disabled={!newUserName.trim()} style={{ flex: 1, padding: "11px 0", borderRadius: 10, border: "none", background: newUserName.trim() ? c.accent : c.border, color: newUserName.trim() ? "#fff" : c.textMuted, fontSize: 13, fontWeight: 500, cursor: newUserName.trim() ? "pointer" : "not-allowed", fontFamily: "inherit" }}>Create</button>
                    </div>
                  </React.Fragment>
                ) : (
                  /* View 1 — User list */
                  <React.Fragment>
                    <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
                      {users.map((user) => (
                        <button key={user.id} onClick={() => handleSelectUser(user)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", borderRadius: 12, border: `1px solid ${c.border}`, background: c.bg, cursor: "pointer", fontFamily: "inherit", textAlign: "left", transition: "all 0.15s", width: "100%" }} onMouseEnter={(e) => e.currentTarget.style.borderColor=c.accent} onMouseLeave={(e) => e.currentTarget.style.borderColor=c.border}>
                          <div style={{ width: 40, height: 40, borderRadius: "50%", background: c.accentSoft, color: c.accent, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, fontWeight: 500, flexShrink: 0 }}>{user.name.charAt(0).toUpperCase()}</div>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontSize: 14, color: c.text, fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{user.name}</div>
                            {user.has_password && <div style={{ fontSize: 11, color: c.textMuted, marginTop: 1 }}>🔒 Password</div>}
                          </div>
                          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style={{ flexShrink: 0 }}><path d="M6 4L10 8L6 12" stroke={c.textMuted} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /></svg>
                        </button>
                      ))}
                    </div>
                    <button onClick={() => { setShowAddUser(true); setNewUserName(""); setNewUserPassword(""); }} style={{ width: "100%", padding: "12px 0", borderRadius: 12, border: `1.5px dashed ${c.border}`, background: "transparent", color: c.textMuted, fontSize: 13, cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s" }} onMouseEnter={(e) => { e.currentTarget.style.borderColor=c.accent; e.currentTarget.style.color=c.accent; }} onMouseLeave={(e) => { e.currentTarget.style.borderColor=c.border; e.currentTarget.style.color=c.textMuted; }}>+ Add User</button>
                    {showUserSwitcher && (
                      <button onClick={() => setShowUserSwitcher(false)} style={{ width: "100%", marginTop: 8, padding: "12px 0", borderRadius: 12, border: `1px solid ${c.border}`, background: "transparent", color: c.textMuted, fontSize: 13, cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s" }}>Cancel</button>
                    )}
                  </React.Fragment>
                )}
              </div>
            </div>
          )}

          {/* Toast notifications */}
          {toasts.length > 0 && (
            <div style={{ position: "fixed", bottom: 24, right: 24, display: "flex", flexDirection: "column", gap: 8, zIndex: 200 }}>
              {toasts.map((toast) => (
                <div key={toast.id} style={{ background: c.surface, border: `1px solid ${c.border}`, borderRadius: 12, padding: "12px 16px", display: "flex", alignItems: "center", gap: 10, boxShadow: `0 4px 16px ${c.shadow}`, animation: "slideUp 0.3s ease", minWidth: 220, maxWidth: 300 }}>
                  <svg width="16" height="16" viewBox="0 0 12 12" fill="none" style={{ flexShrink: 0 }}><path d="M2 6L5 9L10 3" stroke={c.green} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /></svg>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 11, color: c.textMuted, letterSpacing: "0.04em", textTransform: "uppercase", marginBottom: 2 }}>Task done</div>
                    <div style={{ fontSize: 13, color: c.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{toast.name}</div>
                  </div>
                </div>
              ))}
            </div>
          )}

          <style>{`
            @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
            @keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
            @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
            @keyframes fadeIn{from{opacity:0}to{opacity:1}}
            *{box-sizing:border-box;margin:0;padding:0}
            ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:2px}
          `}</style>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
